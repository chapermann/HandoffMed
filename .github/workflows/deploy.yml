name: Deploy Passagem de Plantao

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Injetar a Chave API com Segurança Absoluta
        env:
          CHAVE_NVIDIA: ${{ secrets.NVIDIA_API_KEY }}
        run: |
          # Substituição limpa usando variáveis nativas, evitando quebras por caracteres especiais
          sed -i "s|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|g" index.html

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload do Artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
