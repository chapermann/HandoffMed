<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passagem de Plantão Ideal - Projeto Prompts Médicos Poderosos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333333;
            line-height: 1.6;
            padding: 20px;
        }

        header {
            border-bottom: 2px solid #0056b3;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 {
            color: #0056b3;
            font-size: 24px;
            font-weight: 700;
        }

        .subtitle {
            color: #666666;
            font-size: 14px;
            margin-top: 5px;
        }

        .config-section {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .config-title {
            font-weight: 600;
            color: #495057;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .input-group {
            display: table;
            width: 100%;
            margin-bottom: 10px;
        }

        .input-cell {
            display: table-cell;
            vertical-align: middle;
        }

        .input-cell label {
            font-weight: 600;
            font-size: 13px;
            padding-right: 10px;
            white-space: nowrap;
        }

        .input-cell input, .input-cell select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 13px;
        }

        .grid-container {
            display: block;
        }

        .section-title {
            background-color: #e9ecef;
            color: #495057;
            padding: 8px 12px;
            font-weight: 700;
            font-size: 15px;
            margin-top: 20px;
            margin-bottom: 10px;
            border-left: 4px solid #0056b3;
        }

        .patient-card {
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .patient-header {
            font-weight: 700;
            color: #0056b3;
            font-size: 14px;
            margin-bottom: 10px;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 5px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: 12px;
            color: #495057;
            margin-bottom: 5px;
        }

        textarea {
            width: 100%;
            height: 100px;
            padding: 8px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 13px;
            resize: vertical;
            margin-bottom: 10px;
        }

        button {
            background-color: #0056b3;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 5px;
        }

        button:hover {
            background-color: #004085;
        }

        button.secondary {
            background-color: #6c757d;
        }

        button.secondary:hover {
            background-color: #5a6268;
        }

        .output-box {
            background-color: #f8f9fa;
            border: 1px solid #ced4da;
            border-radius: 4px;
            padding: 10px;
            font-family: monospace;
            font-size: 13px;
            white-space: pre-wrap;
            margin-top: 10px;
            min-height: 50px;
            color: #212529;
        }

        .global-actions {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #dee2e6;
            text-align: left;
        }

        .status-text {
            display: inline-block;
            margin-left: 10px;
            font-size: 13px;
            font-weight: 600;
        }
        
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .processing { color: #ffc107; }
    </style>
</head>
<body>

    <header>
        <h1>Passagem de Plantão Ideal — Diálogo entre Plantonistas</h1>
        <div class="subtitle">Projeto Prompts Médicos Poderosos · Otimização de Transmissão de Casos Clínicos</div>
    </header>

    <div class="config-section">
        <div class="config-title">Configurações da API NVIDIA NIM</div>
        <div class="input-group">
            <div class="input-cell" style="width: 120px;"><label for="api-key">NVIDIA API Key:</label></div>
            <div class="input-cell"><input type="password" id="api-key" placeholder="Insira sua nvapi-key aqui..." value=""></div>
        </div>
        <div class="input-group" style="margin-top: 10px;">
            <div class="input-cell" style="width: 120px;"><label for="model-select">Modelo:</label></div>
            <div class="input-cell">
                <select id="model-select">
                    <option value="meta/llama-3.3-70b-instruct">Meta Llama 3.3 70B Instruct (Recomendado)</option>
                    <option value="deepseek-ai/deepseek-v4-pro">DeepSeek V4 Pro</option>
                </select>
            </div>
        </div>
    </div>

    <div class="grid-container">
        <!-- SALA VERMELHA -->
        <div class="section-title">Sala Vermelha (11 Leitos)</div>
        <div id="sala-vermelha-container"></div>

        <!-- RETAGUARDA DO TRAUMA -->
        <div class="section-title">Sala Retaguarda do Trauma (6 Leitos)</div>
        <div id="sala-trauma-container"></div>
    </div>

    <div class="global-actions">
        <button id="btn-compilar-tudo" class="secondary" style="background-color: #212529; padding: 12px 24px; font-size: 15px;">Gerar Arquivo Único Consolidador</button>
        <button id="btn-baixar-txt" class="secondary" style="background-color: #495057; padding: 12px 24px; font-size: 15px; display: none;">Salvar Tudo em .TXT</button>
        <div style="margin-top: 15px;">
            <label class="form-label" style="font-weight: 700;">Arquivo Único Disponível para Cópia (Todos os Casos Processados):</label>
            <textarea id="output-global" style="height: 250px; font-family: monospace; background-color: #f8f9fa;" readonly placeholder="Os resumos estruturados de todos os pacientes processados aparecerão aqui consolidados..."></textarea>
        </div>
    </div>

    <script>
        const CONFIG = {
            numVermelha: 11,
            numTrauma: 6,
            systemPrompt: `Você é um assistente de inteligência clínica altamente formal. Sua única função é processar uma evolução médica e gerar um resumo extremamente conciso para passagem de plantão de no máximo 50 palavras, garantindo que o diálogo de transmissão dure menos de 2 minutos.

Diretrizes Absolutas de Resposta:
1. NUNCA armazene ou inclua dados que identifiquem nominalmente o paciente, médicos ou equipe.
2. Comprima e resuma os dados para NO MÁXIMO 50 PALAVRAS no total. Seja extremamente objetivo.
3. Se o peso não estiver descrito na evolução, assuma obrigatoriamente 75Kg como padrão universal. Se estiver descrito, use o informado. Outros dados biométricos e sexo devem ser extraídos se informados.
4. Se houver critérios de alta médica da UTI ou Sala Vermelha presentes na evolução, adicione explicitamente a frase exata: "Preenche critérios de alta médica para a enfermaria."
5. Use linguagem puramente clássica, formal, sem emojis, sem gírias, sem maneirismos e evite abreviações não consagradas.
6. Não faça sugestões. Não adicione opiniões. Reforce estritamente a necessidade de definição de condutas imediatas e pendências.
7. O formato de saída deve seguir estritamente o modelo de texto plano abaixo para fácil cópia, preenchendo apenas com as informações extraídas de forma contínua:

[IDENTIFICAÇÃO DO LEITO]
Motivo: [Motivo] | Dias: [X] | Ventilação: [Modo] | Hemodinâmica: [Estável/Instável]
Pontos de Atenção/Urgente: [Dieta, cirurgia, sangue, etc]
Pendências/Imediato: [Condutas do round/exames]
Investimento/Limite: [Definição de reanimação e limites]`
        };

        function renderLeitos() {
            const vermelhaCont = document.getElementById('sala-vermelha-container');
            const traumaCont = document.getElementById('sala-trauma-container');

            // Render Sala Vermelha
            for (let i = 1; i <= CONFIG.numVermelha; i++) {
                vermelhaCont.appendChild(createPatientCard(`Leito Vermelha ${i}`));
            }

            // Render Trauma
            for (let i = 1; i <= CONFIG.numTrauma; i++) {
                traumaCont.appendChild(createPatientCard(`Leito Retaguarda do Trauma ${i}`));
            }
        }

        function createPatientCard(leitoNome) {
            const card = document.createElement('div');
            card.className = 'patient-card';
            card.id = `card-${leitoNome.replace(/\s+/g, '-')}`;

            card.innerHTML = `
                <div class="patient-header">${leitoNome}</div>
                <label class="form-label">Cole aqui a evolução médica</label>
                <textarea class="evolucao-input" placeholder="Insira o texto do prontuário ou evolução médica deste leito..."></textarea>
                <div>
                    <button class="btn-processar">Processar Caso</button>
                    <button class="btn-limpar secondary">Limpar</button>
                    <span class="status-text"></span>
                </div>
                <div class="output-box" id="output-${leitoNome.replace(/\s+/g, '-')}" title="Clique para copiar" style="cursor:pointer; display:none;"></div>
            `;

            const btnProcessar = card.querySelector('.btn-processar');
            const btnLimpar = card.querySelector('.btn-limpar');
            const textarea = card.querySelector('.evolucao-input');
            const outputBox = card.querySelector('.output-box');
            const statusText = card.querySelector('.status-text');

            btnProcessar.addEventListener('click', () => processarPaciente(leitoNome, textarea.value, outputBox, statusText));
            btnLimpar.addEventListener('click', () => {
                textarea.value = '';
                outputBox.innerText = '';
                outputBox.style.display = 'none';
                statusText.innerText = '';
                atualizarGlobal();
            });

            outputBox.addEventListener('click', () => {
                navigator.clipboard.writeText(outputBox.innerText);
                alert(`${leitoNome}: Conteúdo copiado para a área de transferência.`);
            });

            return card;
        }

        async function processarPaciente(leito, textoEvolucao, outputBox, statusText) {
            const apiKey = document.getElementById('api-key').value.trim();
            const modelo = document.getElementById('model-select').value;

            if (!textoEvolucao.trim()) {
                statusText.className = "status-text error";
                statusText.innerText = "Por favor, cole a evolução médica.";
                return;
            }

            if (!apiKey) {
                statusText.className = "status-text error";
                statusText.innerText = "Chave API da NVIDIA ausente.";
                return;
            }

            statusText.className = "status-text processing";
            statusText.innerText = "Processando IA...";
            outputBox.style.display = 'none';

            try {
                const response = await fetch("https://integrate.api.nvidia.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: modelo,
                        messages: [
                            { role: "system", content: CONFIG.systemPrompt },
                            { role: "user", content: `Leito Atual: ${leito}

Evolução Médica Inserida:
${textoEvolucao}` }
                        ],
                        temperature: 0.1,
                        top_p: 0.95,
                        max_tokens: 1024,
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`Erro na API (${response.status})`);
                }

                const data = await response.json();
                const resultado = data.choices[0].message.content.trim();

                outputBox.innerText = resultado;
                outputBox.style.style = 'block';
                outputBox.style.display = 'block';
                statusText.className = "status-text success";
                statusText.innerText = "Concluído.";
                
                atualizarGlobal();

            } catch (error) {
                statusText.className = "status-text error";
                statusText.innerText = `Falha: ${error.message}`;
            }
        }

        function atualizarGlobal() {
            const outputs = document.querySelectorAll('.output-box');
            let textoConsolidado = "==================================================
";
            textoConsolidado += "   RELATÓRIO CONSOLIDADO: PASSAGEM DE PLANTÃO
";
            textoConsolidado += `   Gerado em: ${new Date().toLocaleString('pt-BR')}
`;
            textoConsolidado += "==================================================

";
            
            let temConteudo = false;

            outputs.forEach(box => {
                if (box.innerText.trim()) {
                    temConteudo = true;
                    textoConsolidado += box.innerText + "

--------------------------------------------------

";
                }
            });

            const globalTextArea = document.getElementById('output-global');
            if (temConteudo) {
                globalTextArea.value = textoConsolidado;
                document.getElementById('btn-baixar-txt').style.display = 'inline-block';
            } else {
                globalTextArea.value = '';
                document.getElementById('btn-baixar-txt').style.display = 'none';
            }
        }

        document.getElementById('btn-compilar-tudo').addEventListener('click', () => {
            atualizarGlobal();
            const globalTextArea = document.getElementById('output-global');
            if (globalTextArea.value.trim()) {
                globalTextArea.select();
                navigator.clipboard.writeText(globalTextArea.value);
                alert("Todos os casos compilados foram copiados para a área de transferência!");
            } else {
                alert("Nenhum caso foi processado ainda. Insira as evoluções e clique em 'Processar Caso'.");
            }
        });

        document.getElementById('btn-baixar-txt').addEventListener('click', () => {
            const texto = document.getElementById('output-global').value;
            if (!texto) return;

            const blob = new Blob([texto], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Passagem_de_Plantao_${new Date().toISOString().slice(0,10)}.txt`;
            link.click();
            URL.revokeObjectURL(link.href);
        });

        // Inicializar aplicação
        renderLeitos();
    </script>
</body>
</html>
